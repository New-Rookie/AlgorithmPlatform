seed: 42

paths:
  manifest: data/processed/assembly101/manifest.csv
  output_dir: outputs/checkpoints/videomae_assembly_medium_v1

model:
  name: MCG-NJU/videomae-base-finetuned-kinetics
  num_frames: 16
  image_size: 224
  ignore_mismatched_sizes: true

training:
  epochs: 12
  batch_size: 2
  num_workers: 2
  learning_rate: 0.00002
  weight_decay: 0.01
  gradient_accumulation_steps: 4
  mixed_precision: true
  log_every: 10
  save_every_epoch: true

data:
  train_split: train
  val_split: val
  max_train_samples: null
  max_val_samples: null
  clip_jitter_seconds: 0.2
